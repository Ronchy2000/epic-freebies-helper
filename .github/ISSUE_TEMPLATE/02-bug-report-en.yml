name: Bug report (English)
description: Report a failed claim, login problem, captcha issue, or checkout problem
title: "[Bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, first distinguish the visibility of your fork:

        - If your fork is public, provide the GitHub Actions run URL.
        - If your fork is private, upload the artifact zip files that were actually generated for that run. Maintainers cannot access private Actions pages or private run artifacts.

        How to find the run URL:
        Open the failed or suspicious workflow run, enter the specific job page, then copy the URL from your browser address bar and paste it below. A typical link looks like `https://github.com/<your-account>/<your-repo>/actions/runs/24829120566/job/72672761254`.

  - type: input
    id: workflow_run_url
    attributes:
      label: GitHub Actions run URL
      description: For public forks, paste the full URL. For private forks, explain in the extra context that you uploaded the artifact zip files.
      placeholder: https://github.com/<your-account>/<your-repo>/actions/runs/24829120566/job/72672761254
    validations:
      required: true

  - type: dropdown
    id: repo_visibility
    attributes:
      label: Fork visibility
      options:
        - Public fork
        - Private fork
    validations:
      required: true

  - type: dropdown
    id: problem_type
    attributes:
      label: Problem type
      options:
        - Login failed
        - Captcha failed
        - Checkout failed
        - Workflow showed success but the game was not claimed
        - The game was already claimed but the script did not recognize it
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the actual behavior and what you expected instead
      placeholder: For example, the workflow kept running for a long time and then finished, but the game was already in the library / was still missing / etc.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Keep the steps short and concrete. Include whether this was a manual run or a scheduled run.
      placeholder: |
        1. Forked the repo
        2. Configured secrets
        3. Ran the workflow manually
        4. The issue happened during login / checkout / after "Place Order"
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Optional. Add screenshots, suspected cause, environment details, or anything else useful. If this is a private fork, explicitly state which artifact zip files you uploaded.
